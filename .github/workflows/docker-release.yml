name: Build & deploy to Coolify

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: release
          push: true
          tags: ghcr.io/wiselancer/zeroclaw:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify redeploy
        run: |
          curl -sf -X GET \
            "https://dash.leadcognition.io/api/v1/deploy?uuid=rosc48soo04c4coks8488s8k&token=${{ secrets.COOLIFY_TOKEN }}" \
            || echo "Coolify webhook failed — redeploy manually"
